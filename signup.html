<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Umbrella Shed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #071428;
            --card: #0e2230;
            --card-2: #0b3142;
            --accent: #15c7b6;
            --accent-2: #2fb7ff;
            --muted: #9fb4c7;
            --success: #2ecc71;
            --danger: #ff6b6b;
            --warning: #ffc107;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #052033 0%, var(--bg-1) 100%);
            color: #cfe8ef;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .signup-container {
            width: 420px;
            max-width: 92%;
            background: linear-gradient(180deg, #07232b 0%, #0b2b35 100%);
            border-radius: 14px;
            padding: 34px;
            border: 3px solid rgba(47, 183, 255, 0.12);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .logo {
            font-size: 38px;
            color: var(--accent-2);
            text-align: center;
            margin-bottom: 8px;
        }

        h1 {
            color: var(--accent-2);
            text-align: center;
            margin: 6px 0;
            font-size: 28px;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 18px;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin: 10px 0 6px;
            font-weight: 700;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #f2f2f2;
            color: #07222a;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--accent-2), var(--accent));
            color: #03222a;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .signup-btn:hover {
            opacity: 0.9;
        }

        .signup-footer {
            color: var(--muted);
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }

        .signup-footer a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            color: var(--success);
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .success-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo"><i class="fas fa-umbrella"></i></div>
        <h1>Create Account</h1>
        <p class="subtitle">Umbrella Shed Control</p>

        <form id="signupForm">
            <label for="signupEmail">EMAIL</label>
            <input id="signupEmail" type="email" placeholder="your@email.com" required>

            <label for="signupUser">USERNAME</label>
            <input id="signupUser" type="text" placeholder="username" required>

            <label for="signupPass">PASSWORD</label>
            <input id="signupPass" type="password" placeholder="at least 6 characters" required>

            <label for="signupPassConfirm">CONFIRM PASSWORD</label>
            <input id="signupPassConfirm" type="password" placeholder="confirm password" required>

            <button type="submit" class="signup-btn">✓ SIGN UP</button>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <div class="signup-footer">Already have an account? <a id="loginLink">Log in here</a></div>
        </form>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupEmail = document.getElementById('signupEmail');
        const signupUser = document.getElementById('signupUser');
        const signupPass = document.getElementById('signupPass');
        const signupPassConfirm = document.getElementById('signupPassConfirm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const loginLink = document.getElementById('loginLink');

        // Handle login link
        loginLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        // Handle signup form submission
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            performSignup();
        });

        function performSignup() {
            const email = signupEmail.value.trim();
            const username = signupUser.value.trim();
            const pass = signupPass.value;
            const passConfirm = signupPassConfirm.value;

            // Clear messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Validation
            if (!email.includes('@')) {
                errorMsg.textContent = 'Please enter a valid email';
                errorMsg.classList.add('show');
                return;
            }

            if (username.length < 3) {
                errorMsg.textContent = 'Username must be at least 3 characters';
                errorMsg.classList.add('show');
                return;
            }

            if (pass.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.classList.add('show');
                return;
            }

            if (pass !== passConfirm) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.add('show');
                return;
            }

            // Check if user already exists
            if (localStorage.getItem('users_' + username)) {
                errorMsg.textContent = 'Username already taken';
                errorMsg.classList.add('show');
                return;
            }

            // Save user to localStorage (in production, send to backend)
            localStorage.setItem('users_' + username, pass);
            localStorage.setItem('email_' + username, email);

            successMsg.textContent = 'Account created! Redirecting to login...';
            successMsg.classList.add('show');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    </script>
</body>
</html>
