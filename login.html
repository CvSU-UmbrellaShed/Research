<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Umbrella Shed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #071428;
            --card: #0e2230;
            --card-2: #0b3142;
            --accent: #15c7b6;
            --accent-2: #2fb7ff;
            --muted: #9fb4c7;
            --success: #2ecc71;
            --danger: #ff6b6b;
            --warning: #ffc107;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #052033 0%, var(--bg-1) 100%);
            color: #cfe8ef;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            width: 420px;
            max-width: 92%;
            background: linear-gradient(180deg, #07232b 0%, #0b2b35 100%);
            border-radius: 14px;
            padding: 34px;
            border: 3px solid rgba(47, 183, 255, 0.12);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .logo {
            font-size: 38px;
            color: var(--accent-2);
            text-align: center;
            margin-bottom: 8px;
        }

        h1 {
            color: var(--accent-2);
            text-align: center;
            margin: 6px 0;
            font-size: 28px;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 18px;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin: 10px 0 6px;
            font-weight: 700;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #f2f2f2;
            color: #07222a;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .login-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .remember-check {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .login-row label {
            margin: 0;
            font-size: 13px;
            color: var(--muted);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--accent-2), var(--accent));
            color: #03222a;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .demo-box {
            background: rgba(15, 71, 86, 0.18);
            border: 1px solid rgba(47, 183, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-top: 14px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .demo-box strong {
            color: var(--accent-2);
        }

        .login-footer {
            color: var(--muted);
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }

        .login-footer a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-umbrella"></i></div>
        <h1>Umbrella Shed</h1>
        <p class="subtitle">Smart Control System</p>

        <form id="loginForm">
            <label for="loginUser">USERNAME</label>
            <input id="loginUser" type="text" placeholder="" required>

            <label for="loginPass">PASSWORD</label>
            <input id="loginPass" type="password" placeholder="" required>

            <div class="login-row">
                <input id="rememberMe" class="remember-check" type="checkbox">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="login-btn">↪ LOGIN</button>

            <div class="error-msg" id="errorMsg"></div>

            <div class="demo-box">
                <strong>Demo Credentials:</strong><br>
                Username: <strong>admin</strong><br>
                Password: <strong>password123</strong>
            </div>

            <div class="login-footer">Don't have an account? <a id="signupLink">Sign up here</a></div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginUser = document.getElementById('loginUser');
        const loginPass = document.getElementById('loginPass');
        const rememberMe = document.getElementById('rememberMe');
        const errorMsg = document.getElementById('errorMsg');
        const signupLink = document.getElementById('signupLink');

        // Load remembered user if exists
        window.addEventListener('load', () => {
            if (localStorage.getItem('rememberedUser')) {
                loginUser.value = localStorage.getItem('rememberedUser');
                rememberMe.checked = true;
            }
        });

        // Handle login form submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            performLogin();
        });

        // Handle signup link
        signupLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'signup.html';
        });

        function performLogin() {
            const u = loginUser.value.trim();
            const p = loginPass.value;

            // Clear error message
            errorMsg.classList.remove('show');

            // Demo credential check — replace with real auth if available
            if ((u === 'admin' && p === 'password123') || (localStorage.getItem('users_' + u) && localStorage.getItem('users_' + u) === p)) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', u || 'admin');
                if (rememberMe.checked) {
                    localStorage.setItem('rememberedUser', u);
                } else {
                    localStorage.removeItem('rememberedUser');
                }
                window.location.href = 'NEW3.html';
            } else {
                errorMsg.textContent = 'Invalid username or password';
                errorMsg.classList.add('show');
                loginPass.value = '';
            }
        }
    </script>
</body>
</html>
