<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Shed - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #071428;
            --bg-2: #0a1a2e;
            --accent: #15c7b6;
            --accent-2: #00d9ff;
            --muted: #9fb4c7;
            --danger: #ff6b6b;
            --border-accent: #00d9ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #052033 0%, var(--bg-1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #cfe8ef;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(14, 34, 48, 0.8);
            border: 2px solid var(--border-accent);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .logo-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-2);
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-2);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: var(--accent-2);
        }

        .checkbox-label {
            font-size: 12px;
            color: #cfe8ef;
            cursor: pointer;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--accent-2), #00d9ff);
            color: #07222b;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-credentials {
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .demo-credentials-title {
            color: var(--accent-2);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .demo-credentials-item {
            color: var(--muted);
            margin-bottom: 4px;
        }

        .demo-credentials-item strong {
            color: var(--accent-2);
        }

        .demo-credentials-item:last-child {
            margin-bottom: 0;
        }

        .signup-link {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .signup-link a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .signup-link a:hover {
            color: var(--accent);
        }

        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #15c7b6;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                border-radius: 12px;
                padding: 30px 20px;
            }

            .logo-title {
                font-size: 24px;
            }

            .logo-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-umbrella"></i></div>
            <h1 class="logo-title">Umbrella Shed</h1>
            <p class="logo-subtitle">Smart Control System</p>
        </div>

        <!-- Login Form -->
        <form onsubmit="handleLogin(event)">
            <!-- Username -->
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    class="form-input"
                    placeholder="admin"
                    required
                />
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="••••••••••"
                    required
                />
            </div>

            <!-- Remember Me -->
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" class="checkbox-input" />
                <label class="checkbox-label" for="rememberMe">Remember me</label>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Success Message -->
            <div class="success-message" id="successMessage"></div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <div class="demo-credentials-title">Demo Credentials:</div>
            <div class="demo-credentials-item">Username: <strong>admin</strong></div>
            <div class="demo-credentials-item">Password: <strong>password123</strong></div>
        </div>

        <!-- Sign Up Link -->
        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up here</a>
        </div>
    </div>

    <script>
        // Prefill demo credentials on load
        window.addEventListener('load', () => {
            const rememberMe = localStorage.getItem('rememberMe');
            if (rememberMe === 'true') {
                document.getElementById('username').value = localStorage.getItem('lastUsername') || '';
                document.getElementById('rememberMe').checked = true;
            }
        });

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // Clear messages
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
            if (successDiv) {
                successDiv.classList.remove('show');
                successDiv.textContent = '';
            }

            // Get accounts from localStorage
            const accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            const user = accounts.find(acc => acc.username.toLowerCase() === username.toLowerCase() && acc.password === password);

            if (user) {
                // Store login state
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', user.username);

                // Remember me
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                    localStorage.setItem('lastUsername', username);
                } else {
                    localStorage.setItem('rememberMe', 'false');
                    localStorage.removeItem('lastUsername');
                }

                // Show success message and countdown
                let countdown = 2;
                if (!successDiv) {
                    const newDiv = document.createElement('div');
                    newDiv.id = 'successMessage';
                    newDiv.className = 'success-message show';
                    document.querySelector('form').insertBefore(newDiv, document.querySelector('.login-btn'));
                }
                const msgDiv = document.getElementById('successMessage');
                msgDiv.textContent = `Login successful! Redirecting to dashboard in ${countdown} seconds...`;
                msgDiv.classList.add('show');
                const interval = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        msgDiv.textContent = `Login successful! Redirecting to dashboard in ${countdown} seconds...`;
                    } else {
                        clearInterval(interval);
                        window.location.href = 'NEW3.html';
                    }
                }, 1000);
            } else {
                // Show error
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.classList.add('show');
                document.getElementById('password').value = '';
            }
        }

        // Prevent going back to login if already logged in
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'NEW3.html';
        }
    </script>
</body>
</html>
